{% extends 'base.html' %}
{% load static %}

{% block title %}ОФОРМЛЕНИЕ ЗАКАЗА | PetStore{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card bg-dark border border-secondary p-5 rounded-0 shadow-none">
        <h2 class="mb-4 text-uppercase border-start border-info border-4 ps-3">Оформление заказа</h2>

        <form method="post" class="mt-4">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="form-label text-muted small text-uppercase">Адрес доставки</label>
                <input type="text" name="address" class="form-control rounded-0 bg-dark text-light border-secondary p-3" 
                       placeholder="Введите ваш адрес..." required>
            </div>

            <div class="alert alert-secondary rounded-0 border-0 text-muted small mb-4">
                Проверьте данные перед подтверждением. Ваш заказ будет обработан в ближайшее время.
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-info rounded-0 px-5 text-dark fw-bold">ПОДТВЕРДИТЬ ЗАКАЗ</button>
                <a href="{% url 'shop:cart' %}" class="btn btn-outline-secondary rounded-0 px-4">НАЗАД В КОРЗИНУ</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
